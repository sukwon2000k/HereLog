<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./css/post.css">
    <script src="./js/post.js" defer></script>
</head>
<body>

    <div class="container">

        <!-- 헤더 -->
        <div id="header">

            <button class="headerBtn backBtn">
                ⬅️
            </button>

            <div class="page-title">
                새 기록 작성 <!--더미-->
                <span>HERELOG</span> 
            </div>

            <div class="dummy"></div>

        </div>

        <!-- 본문 -->
        <div class="content">

            <!-- 현재 위치 -->
            <div class="location-info">
                📍 현재 위치 불러오는 중... <!--더미-->
            </div>

            <!-- 사진 선택 -->
            <input
                type="file"
                id="file-input"
                accept="image/*"
                onchange="previewImage()"
                hidden
            >

            <label for="file-input" class="upload-btn">
                <span id="uploadIcon">＋</span>
                <p id="uploadText">사진 등록하기</p>
            </label>

            <!-- 미리보기 -->
            <div class="preview-area" id="preview-area">

                <img
                    id="preview-img"
                    src=""
                    alt="미리보기"
                >

                <button
                    type="button"
                    id="removeImg"
                    class="remove-btn"
                >
                    ✕
                </button>

            </div>

            <!-- 게시글 -->
            <textarea
                id="content"
                class="post-content"
                maxlength="500"
                placeholder="이 순간을 기록해보세요."
            ></textarea>

            <!-- 글자수 -->
            <div class="text-count">
                <span id="count">0</span> / 500
            </div>

        </div>

        <!-- 등록 -->
        <div id="footer">

            <button id="submitBtn" class="submit-btn">
                기록 저장하기
            </button>

        </div>

    </div>
    
</body>
</html>
